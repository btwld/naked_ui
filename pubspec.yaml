name: naked_ui_workspace
environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dev_dependencies:
  flutter_lints: ^6.0.0
  melos: ^7.3.0

workspace:
  - packages/example
  - packages/naked_ui

melos:
  # IDE settings (migrated from melos.yaml for Melos 7.x)
  ide:
    intellij:
      enabled: false

  # Version settings (migrated from melos.yaml for Melos 7.x)
  repository: https://github.com/btwld/naked_ui
  command:
    version:
      linkToCommits: true
      workspaceChangelog: true

  scripts:
    get:
      description: Get dependencies for all packages
      run: fvm flutter pub get

    analyze:
      description: Run static analysis
      run: fvm flutter analyze --fatal-infos --fatal-warnings

    format:
      description: Format all Dart code
      run: fvm dart format .

    format:check:
      description: Check if all Dart code is formatted
      run: fvm dart format --output=none --set-exit-if-changed .

    test:all:
      description: Run all unit and widget tests
      run: fvm dart tool/test.dart --unit

    # Build commands
    build:example:
      description: Compile the example's platform-neutral asset bundle
      exec: fvm flutter build bundle
      packageFilters:
        scope: example

    # CI/CD commands
    ci:
      description: Run CI checks (format, analyze, test)
      run: |
        fvm dart format --output=none --set-exit-if-changed . &&
        fvm flutter analyze --fatal-infos --fatal-warnings &&
        fvm dart tool/test.dart --unit
