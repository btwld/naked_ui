name: Flutter CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - docs/**
      - docs.json

  push:
    branches:
      - main
    paths-ignore:
      - docs/**
      - docs.json

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  minimum-flutter:
    name: Minimum Flutter (3.41.0)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up exact minimum Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze at the declared minimum
        run: flutter analyze

      - name: Run package widget and semantics tests
        run: flutter test packages/naked_ui/test

  test:
    name: Run Tests
    # Goldens are approved only on this explicit host image with Flutter
    # 3.41.2 and the checked-in test font.
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.2'
          cache: true

      - name: Install dependencies (workspace)
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze project
        run: flutter analyze

      - name: Install DCM
        uses: CQLabs/setup-dcm@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Run DCM
        run: dcm analyze .
        continue-on-error: true  # DCM requires paid license for CI - apply for free OSS license at dcm.dev/pricing

      - name: Run tests
        run: flutter test packages/naked_ui/test --coverage

      - name: Run example tests
        id: example_tests
        run: flutter test packages/example/test

      # A missing reference image does not create a file under failures/. Run
      # the same pinned golden suite in update mode so reviewers still receive
      # a candidate from the authoritative Ubuntu host. The original test step
      # remains failed until the candidate is explicitly reviewed and checked
      # in.
      - name: Generate golden candidate images
        if: failure() && steps.example_tests.outcome == 'failure'
        run: flutter test packages/example/test/goldens --update-goldens

      - name: Upload golden failure images
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures-${{ github.sha }}
          path: |
            packages/example/test/goldens/components/failures/
            packages/example/test/goldens/components/baselines/
          if-no-files-found: ignore
          retention-days: 14

      - name: Setup LCOV
        uses: hrishikesh-kadam/setup-lcov@v1
        with:
          ref: v2.3

      # Coverage remains visible for review, but no percentage is presented as
      # a gate until the project adopts an evidence-based baseline. The
      # blocking requirement is the test run above plus the contract tests for
      # each changed component.
      - name: Report code coverage (informational)
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: coverage/lcov.info
          artifact-name: code-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
