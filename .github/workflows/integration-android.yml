name: Android Integration Tests

on:
  workflow_dispatch:

# Avoid overlapping runs for same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests-android:
    name: Run integration_test on Android emulator
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: 'stable'
          flutter-version-file: .fvmrc
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Resolve root dependencies
        run: flutter pub get

      - name: Resolve example dependencies
        run: flutter pub get
        working-directory: packages/example

      - name: Ensure Android platform files for example
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms android .
          fi
        working-directory: packages/example

      - name: Launch emulator and run integration tests
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          force-avd-creation: true
          disable-animations: true
          script: |
            adb devices -l
            cd packages/example
            flutter test integration_test/all_tests.dart -d emulator-5554
