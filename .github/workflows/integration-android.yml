name: Android Integration Tests

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - packages/naked_ui/**
      - packages/example/**
      - tool/**
      - pubspec.yaml
      - pubspec.lock
      - .github/workflows/integration-android.yml
  merge_group:

# Avoid overlapping runs for same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-android
  cancel-in-progress: true

jobs:
  integration-tests-android:
    name: Run integration_test on Android emulator
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.2'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Resolve root dependencies
        run: flutter pub get

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Launch emulator and run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          NAKED_UI_GIT_SHA: ${{ github.sha }}
          NAKED_UI_FLUTTER_VERSION: '3.41.2'
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          force-avd-creation: true
          disable-animations: true
          script: bash tool/run_android_integration.sh

      - name: Upload Android integration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-android-${{ github.sha }}
          path: |
            packages/example/build/integration_test_screenshots/
            packages/example/build/integration_response_data.json
          if-no-files-found: warn
          retention-days: 14
